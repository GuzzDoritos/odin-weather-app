<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <div class="main-wrapper-grid">

        <div class="header-wrapper">

            <div class="search-box-wrapper">
                <h1>ここに〒・住所を入力しませんか？</h1>
                <input type="text" name="search-box-input" id="search-box-input">
            </div>

        </div>

        <div class="tenki-info-wrapper-grid">

            <div class="today-conditions-wrapper-grid">
                <div class="today-conditions-icon">
                    <div class="kanji-icon-wrapper">
                        <div id="kanji-text">晴れ</div>
                    </div>
                </div>

                <div class="today-conditions-info-grid">
                    <div class="today-conditions-info-cell">
                        <div class="today-conditions-info-title">気温</div>
                        <div class="today-conditions-info-list">
                            <ul>
                                <li>
                                    最高：<span id="kyou-no-saikou"></span>°c
                                </li>
                                <li>
                                    最低：<span id="kyou-no-saitei"></span> °c
                                </li>
                            </ul>
                        </div>
                    </div>
                    <div class="today-conditions-info-cell">
                        <div class="today-conditions-info-title">降水確率</div>
                        <div class="today-conditions-info-list">
                            <table>
                                <tbody>
                                    <thead>
                                        <th>
                                            時間
                                        </th>
                                        <th>
                                            確率
                                        </th>
                                    </thead>
                                    <tr>
                                        <td>00-06</td>
                                        <td><span id="jikan-1"></span>%</td>
                                    </tr>
                                    <tr>
                                        <td>06-12</td>
                                        <td><span id="jikan-2"></span>%</td>
                                    </tr>
                                    <tr>
                                        <td>12-18</td>
                                        <td><span id="jikan-3"></span>%</td>
                                    </tr>
                                    <tr>
                                        <td>18-24</td>
                                        <td><span id="jikan-4"></span>%</td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                    <div class="today-conditions-info-cell">
                        <div class="today-conditions-info-title">最大風速</div>
                        <div class="today-conditions-info-list">南3m/s</div>
                    </div>
                    <div class="today-conditions-info-cell">
                        <div class="today-conditions-info-title">太陽</div>
                        <div class="today-conditions-info-list">
                            <ul>
                                <li>日の出｜04時39分</li>
                                <li>日の入｜18時09分</li>
                            </ul>
                        </div>
                    </div>
                </div>
            </div>

            <div class="future-conditions-wrapper">

                <div class="future-conditions-title">
                    <h1>マリンガ市の十日間天気</h1>
                </div>

                <div class="future-conditions-board">

                    <div class="future-condition-day-grid">
                        <div class="future-conditions-icon"><span>火曜日</span></div>
                        <div class="future-conditions-info">
                            <div class="info">
                                <div class="future-title">
                                    天気
                                </div>
                                <div class="future-info" id="tenki-info">
                                    曇のち晴
                                </div>
                            </div>
                            <div class="info">
                                <div class="future-title">
                                    気温
                                </div>
                                <div class="future-info">
                                    <ul>
                                        <li>15</li>
                                        <li>6</li>
                                    </ul>
                                </div>
                            </div>
                            <div class="info">
                                <div class="future-title">
                                    降水確率
                                </div>
                                <div class="future-info">
                                    40%
                                </div>
                            </div>

                        </div>
                    </div>

                    <div class="future-condition-day-grid">
                        <div class="future-conditions-icon">水曜日</div>
                        <div class="future-conditions-info"></div>
                    </div>

                    <div class="future-condition-day-grid">
                        <div class="future-conditions-icon">木曜日</div>
                        <div class="future-conditions-info"></div>
                    </div>

                    <div class="future-condition-day-grid">
                        <div class="future-conditions-icon">金曜日</div>
                        <div class="future-conditions-info"></div>
                    </div>

                    <div class="future-condition-day-grid">
                        <div class="future-conditions-icon">土曜日</div>
                        <div class="future-conditions-info"></div>
                    </div>

                    <div class="future-condition-day-grid">
                        <div class="future-conditions-icon">日曜日</div>
                        <div class="future-conditions-info"></div>
                    </div>

                    <div class="future-condition-day-grid">
                        <div class="future-conditions-icon">月曜日</div>
                        <div class="future-conditions-info"></div>
                    </div>

                    <div class="future-condition-day-grid">
                        <div class="future-conditions-icon">火曜日</div>
                        <div class="future-conditions-info"></div>
                    </div>

                    <div class="future-condition-day-grid">
                        <div class="future-conditions-icon">水曜日</div>
                        <div class="future-conditions-info"></div>
                    </div>

                    <div class="future-condition-day-grid">
                        <div class="future-conditions-icon">木曜日</div>
                        <div class="future-conditions-info"></div>
                    </div>

                </div>

            </div>

        </div>

    </div>
</body>
</html>
